{% extends 'base.html' %}

{% block content %}

<div class="auth-container">
    <div class="auth-box">
        <h2>Register</h2>

        <form method="POST">
            {% csrf_token %}
            {{ form.as_p }}
            <button type="submit">Create Account</button>
        </form>

        <p style="text-align:center; margin-top:15px;">
            Already have an account?
            <a href="{% url 'login' %}">Login</a>
        </p>
    </div>
</div>

{% endblock %}
